work_experience:
  - company: Square (Block, Inc.)
    title: Senior Software Engineer
    dates: August 2022 - February 2026
    highlights:
      - >
        Identified an unstable Core Data pattern underpinning every transaction across Square's suite of point of sale apps.
        Led a multi-phase effort to install compile-time safeguards for high-traffic fetching operations; architected,
        shipped, and open-sourced a declarative, type-safe predicate DSL adopted across Square's iOS codebases.
        Introduced the first Swift macro into the codebase to generate boilerplate and enforce compile-time checks.
        Reduced Core Data query development and code review time by 40%.
      - >
        Served as iOS DRI for OCR-Assisted Receive, a cross-functional feature enabling Square sellers to scan invoices
        with their device camera instead of manually entering inventory. Authored engineering design documents, coordinated
        release plans with PM, design, and QA through product and design ownership changes, and scoped an ambiguous
        greenfield project into achievable milestones. Alpha testing party surfaced only 2 P3 bugs. Laid the foundation for
        Square's broader OCR platform initiative. Reduced inventory intake time by 75%.
      - >
        Led end-to-end migration of Square's most complex seller-facing screen from a mix of Objective-C, UIKit,
        and multiple internal UI frameworks into a modern, unified Swift architecture. Untangled 12+ years of tech debt,
        broke the project into phased milestones, and led a team of 3 engineers through critical components. Shipped with
        zero P0/P1/P2 bugs; maintained all existing tests and raised coverage from 44% to 95%. Delivered a dramatically
        more stable seller experience and cut new feature development time by ~3x through modern, composable architecture.
      - >
        Created an SPM-Bazel dual-module CLI tool that generates hybrid Swift Package modules with full Bazel
        compatibility, enabling SwiftUI Previews and isolated development workflows across Square's iOS monorepo.
        Reduced UI iteration feedback loops from minutes to sub-second; gave a lightning talk evangelizing the pattern &
        supported several teams in adopting the pattern.
      - >
        Pioneered AI-assisted development at Block by founding a Copilot for Xcode working group before generative AI
        tooling was industry-standard. Navigated security review and legal approval; configured and distributed to all
        Block iOS engineers. Helped establish the foundation for the organization's shift toward AI-first engineering workflows.
      - >
        Rescued an orphaned localization REST API after a reorg by organizing knowledge transfer meetings and announcing
        ownership. Consolidated scattered documentation into a single searchable repository, reducing discovery time
        from minutes to seconds.
      - >
        Championed Square's migration from Jira to Linear from the ground up: unblocked a two-year-old data migration
        integration that had stalled without ownership; escalated across security, IT, and engineering leadership; built
        organizational momentum where none existed. Internal DX surveys ranked Jira as engineers' #1 pain point. Drove a
        company-wide pilot that led to Square's full adoption of Linear. Leadership cited this work when making the
        final decision to switch to Linear.

  - company: Robot Hand, LLC
    title: Owner / Sole Engineer
    dates: 2022 - Present
    highlights:
      - >
        Co-designed and solo-engineered Constellation Quest, an offline-first scavenger hunt PWA for GRiZ's Seven Stars
        Festival (~23,500 attendees). Shaped the end-to-end fan experience beyond just the app, influencing signage,
        reward mechanics, and on-site interactions. Built with Vite, TypeScript, and localStorage for zero connectivity
        environments. Shipped ahead of schedule with zero downtime; became a fan-favorite highlight with organic
        community engagement across Reddit.
      - >
        Designed, built, and shipped Chosen One to the App Store: a multi-touch finger-picker app for game night.
        Engineered custom multi-touch tracking, animated ring themes with StoreKit 2 in-app purchases, and polished
        haptic feedback. Zero accounts, zero ads, focused on delightful UX that makes a simple moment feel special.
      - >
        Built and open-sourced developer tools solving real workflow pain points: taipo (AI-powered shell typo fixer),
        slog (automated Simulator login CLI, and Emochi (system-wide emoji picker for macOS).

