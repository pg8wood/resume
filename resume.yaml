    dates: July 2018 - August 2022
    title: Senior iOS Engineer
    projects:
      - name: FOX Consumer Products & Engineering
        highlights:
          - >
            Architected cross-platform features and served as tvOS tech lead for FOX's shared video player SDK.
            Drove adoption across the entire FOX app suite (FOX Now, Sports, Weather, Nation, News International)
            by establishing consistent integration patterns and enabling partner teams to ship reliable video
            experiences at scale.
          - >
            Automated key continuous delivery pipeline steps for FOX video SDK releases and reduced release cycle time by
            25% based on pipeline data.
          - >
            Built and open-sourced an automated Changelog Generator for FOX release workflows, eliminating a recurring
            merge conflict tax on every pull request and saving an estimated hour of manual resolution per release cycle.
          - >
            Evangelized SharePlay, created and demoed a proof of concept to VP and C-level stakeholders; procured
            program-level buy-in. Received official feedback from Fox's VP of Video Platforms and WillowTree VPs.
          - >
            Invested in growth of team members by mentoring newer engineers and providing opportunities to own larger,
            complex features and communicate with external clients.

      - name: FOX Television Stations
        highlights:
          - >
            Created 8 FOX Television Stations apps using a white-label architecture and scaled CI infrastructure to support
            27 white-label apps.
          - >
            Identified a recurring 10 person-hour per sprint cost from .xcodeproj merge conflicts on a 50-person team and
            set direction on generated project files. Rolled out XcodeGen by replacing an ~80,000-line .pbxproj with a
            ~200-line YAML definition adopted across 27 white-label apps.

      - name: WillowTree Live Apps Team
        highlights:
          - >
            Onboarded and maintained 10 inherited, mature codebases and ingested CI/CD pipelines into WillowTree's stack,
            establishing standardized release ownership across the portfolio.
          - >
            Delivered an emergency Wyndham Hotels COVID-19 guest-guidance feature and was named by the client as a
            reason for contract renewal.

      - name: CFA Institute
        highlights:
