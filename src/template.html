<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{name}} — Resume</title>
  <style>{{styles}}</style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 class="name">{{name}}</h1>
      <hr class="header-line">
      <div class="links-row">{{links}}</div>
    </header>

    <section class="section">
      <h2 class="section-title"><span class="section-icon">💼</span> Work Experience</h2>
      {{experience}}
    </section>

    <section class="section">
      <h2 class="section-title"><span class="section-icon">🎓</span> Education</h2>
      {{education}}
    </section>

    <section class="section">
      <h2 class="section-title"><span class="section-icon">🛠</span> Skills</h2>
      {{skills}}
    </section>
  </div>
</body>
</html>
