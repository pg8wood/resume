      - name: Vitality Group
        highlights:
          - >
            Joined a red-status Health & Wellness engagement, addressed burnout through team-health interventions and
            team-building sessions, and rebuilt a sustainable delivery cadence. Converted project trajectory and delivered a
            HealthKit rewards feature on time.

      - name: Locus Health
        highlights:
          - >
            Discovered, raised, and fixed a privacy issue where stored health data did not meet encryption guidelines, then
