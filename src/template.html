<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{name}}'s Resume</title>
  <style>{{styles}}</style>
</head>
<body class="dark-mode">
  <button id="theme-toggle" aria-label="Toggle dark mode">
    <svg id="sun-icon" style="display:none" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
    <svg id="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
  </button>

  <div class="page">
    <!-- 
      PDF LAYOUT HACK:
      We use a table structure to ensure margins are repeated on EVERY page in the PDF.
      - The <thead> provides a repeating top margin.
      - The <tfoot> provides a repeating bottom margin.
      - This allows us to set @page margins to 0 (to let the purple accent flair bleed to the edges)
        while keeping a consistent "printable area" for the text content.
    -->
    <table class="layout-table">
      <thead>
        <tr><td class="page-top-spacer"></td></tr>
      </thead>
      <tfoot>
        <tr><td class="page-bottom-spacer"></td></tr>
      </tfoot>
      <tbody>
        <tr>
          <td>
            <header class="header">
              <h1 class="name">{{name}}</h1>
              
              <div class="links-row">{{links}}</div>
              <hr class="header-line">
            </header>

            <section id="work-experience" class="section">
              <h2 class="section-title">{{icon-experience}} Work Experience</h2>
              {{experience}}
            </section>

            <section class="section">
              <h2 class="section-title">{{icon-education}} Education</h2>
              {{education}}
            </section>

            <section class="section">
              <h2 class="section-title">{{icon-skills}} Skills</h2>
              {{skills}}
            </section>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const toggle = document.getElementById('theme-toggle');
    const sun = document.getElementById('sun-icon');
    const moon = document.getElementById('moon-icon');
    const body = document.body;

    function updateIcons() {
      if (body.classList.contains('dark-mode')) {
        sun.style.display = 'block';
        moon.style.display = 'none';
      } else {
        sun.style.display = 'none';
        moon.style.display = 'block';
      }
    }

    // Initialize icons
    updateIcons();

    toggle.addEventListener('click', () => {
      body.classList.toggle('dark-mode');
      updateIcons();
    });
  </script>
</body>
</html>
