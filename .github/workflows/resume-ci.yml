name: Resume CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Test (build + verify)
        run: npm test

  dispatch-website:
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WEBSITE_REPO_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: "pg8wood",
              repo: "website",
              event_type: "resume-updated",
              client_payload: {
                resume_sha: context.sha,
                resume_ref: context.ref.replace("refs/heads/", "")
              }
            });
