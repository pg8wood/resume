work_experience:
  - company: Square (Block, Inc.)
    title: Senior Software Engineer
    dates: August 2022 - February 2026
    highlights:
      - >
        Identified an unstable Core Data pattern underpinning every transaction across Square's point of sale apps and set
        direction on a multi-phase hardening effort. Architected, shipped, and open-sourced a declarative, type-safe
        predicate DSL, plus Square's first Swift macro to remove boilerplate and enforce compile-time query checks.
        Reduced Core Data query development and code review time by 40% based on internal cycle-time data.
      - >
        Owned iOS delivery as DRI for OCR-Assisted Stock Intake, led a 3-engineer iOS team, and translated ambiguous
        product and design inputs into engineering design docs, phased milestones, and execution strategy.
        Implemented core feature work while driving cross-functional release execution through PM, design, and QA ownership
        changes, and established the technical foundation for Square's broader OCR platform initiative. Alpha testing surfaced
        only 2 P3 bugs, and launch measurements showed seller inventory intake time down 75%.
      - >
        Drove end-to-end migration of Square's most complex seller-facing screen from Objective-C, UIKit, and multiple
        internal UI frameworks to a unified Swift architecture. Broke 12+ years of tech debt into phased milestones and led
        3 engineers through delivery while preserving existing tests. Shipped with zero P0/P1/P2 bugs, raised coverage from
        44% to 95%, and cut new feature development time by ~3x based on observed team throughput.
      - >
        Established an SPM-Bazel dual-module CLI standard for hybrid Swift Package modules in Square's bazel-based iOS monorepo.
        Built and rolled out tooling to enable SwiftUI Previews and isolated development workflows. Evangelized the new
        capabilities and drove adoption by directly onboarding and supporting partner teams. Reduced UI iteration loops
        from minutes to seconds based on observed local build and preview cycles.
      - >
        Pioneered AI-assisted development at Block by founding a Copilot for Xcode working group and setting direction for
        secure adoption before generative AI tooling became standard internally. Drove security and legal review, then
        rolled out configuration and access to all Block iOS engineers. Helped establish the foundation for the
        organization's shift toward AI-first engineering workflows.
      - >
        Rescued an orphaned localization REST API after a reorg risked service drift by establishing ownership and driving
        knowledge transfer sessions. Standardized scattered docs into a single searchable source of truth. Reduced
        discovery time from minutes to seconds based on engineer feedback.
      - >
        Advocated for Square's Jira-to-Linear migration by persistently surfacing blockers in a two-year-stalled data
        integration and pushing security, IT, and engineering leadership to prioritize the switch. Helped establish pilot
        scope and build adoption momentum while internal DX surveys ranked Jira as engineers' #1 pain point. Pilot results
        led to full Square adoption of Linear, and leadership cited this advocacy in the final switch decision.

  - company: Robot Hand, LLC
    title: Owner / Sole Engineer
    dates: 2022 - Present
    highlights:
      - >
        Co-defined and solo-engineered Constellation Quest, an offline-first scavenger hunt PWA for GRiZ's Seven Stars
        Festival (~23,500 attendees). Set direction for both product and on-site execution, including signage, reward
        mechanics, and interaction flows in zero-connectivity environments. Built with Vite, TypeScript, and localStorage;
        shipped ahead of schedule with zero downtime and became a fan-favorite highlight with organic Reddit engagement.
      - >
        Designed and shipped Chosen One to the App Store, defining a focused game-night utility with zero accounts and
        zero ads. Implemented custom multi-touch tracking, animated ring themes via StoreKit 2 in-app purchases, and
        tuned haptics for reliable tactile feedback. Delivered a polished, low-friction experience centered on repeat social use.
      - >
        Maintain full product ownership and demonstrate continuous delivery by independently identifying friction points
        and shipping a portfolio of tools and apps: Recipe Nabber (iOS Safari extension to extract recipes),
        Emochi (system-wide macOS emoji picker), slog (automated Simulator login CLI), taipo (AI shell typo fixer),
        and an automated Changelog Generator.

